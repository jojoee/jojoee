name: continuous-integration
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14.5"
      - name: Display Python version
        run: python -c "import sys; print(sys.version)"
      - name: Install dependencies
        run: uv pip install -r requirements.txt -r requirements-dev.txt
      - name: Lint with flake8
        run: |
          # all Python files should follow PEP8 (except some notebooks, see setup.cfg)
          python -m flake8 --ignore=E501
      - name: Test with pytest
        run: python -m pytest tests --cov=./ --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
